name: Deploy API

# GitOps for the API container: push to main touching the server (or image
# definition) builds and publishes ghcr.io/<owner>/knowledge-loom-api, then
# deploys to Cloudflare Containers when the CLOUDFLARE_* secrets exist.
# Without those secrets the deploy step is skipped, so this workflow is safe
# in forks and in the open-source tree. The three frontends deploy via
# Cloudflare Pages' native Git integration (docs/DEPLOYMENT.md).

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/knowledge-loom-api" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          docker build -t "$IMAGE:${GITHUB_SHA::12}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${GITHUB_SHA::12}"
          docker push "$IMAGE:latest"

  deploy-cloudflare:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check deploy credentials
        id: creds
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_* secrets not configured — skipping deploy (image is published to GHCR)."
          fi

      - uses: actions/checkout@v7
        if: steps.creds.outputs.present == 'true'

      - name: Deploy container Worker
        if: steps.creds.outputs.present == 'true'
        run: |
          npm i -g wrangler
          # infra/cloudflare/wrangler.toml binds the container image published
          # above; runtime secrets are managed with `wrangler secret put`.
          wrangler deploy --config infra/cloudflare/wrangler.toml
