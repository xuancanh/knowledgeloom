name: Dependency review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    # Dependency graph on private repos requires GitHub Advanced Security;
    # this activates automatically once the repo is public (planned: AGPL-3.0 open-source core).
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
