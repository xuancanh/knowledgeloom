name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1' # weekly sweep for newly-published query packs

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    # Code-scanning upload on private repos requires GitHub Advanced Security;
    # this activates automatically once the repo is public (planned: AGPL core).
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
