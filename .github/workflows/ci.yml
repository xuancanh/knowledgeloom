name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Postgres parity gate: the e2e suite is re-run against this service with
      # DATABASE_DIALECT=postgres so dialect regressions (sqlite-only .run()/.get(),
      # unquoted identifiers, missing PG migrations) fail CI instead of shipping.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knowledge
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (server + frontend)
        run: npm run build

      # Unit, frontend, e2e (spawned server + redis), and integration suites.
      # Every suite isolates itself: temp KNOWLEDGE_ROOT, dedicated REDIS_DB.
      - name: Test
        run: npm run test:all

      # Re-run the full e2e API suite against Postgres to prove dialect parity.
      - name: Test (Postgres dialect)
        run: npm run test:e2e:postgres
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledge

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t knowledge-loom-api:ci .
      - name: Smoke-boot the image
        run: |
          docker run -d --name kl -e SKIP_JOBS=1 -e SEARCH_PROVIDER=inmemory -p 8787:8787 knowledge-loom-api:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8787/api/status > /dev/null; then
              echo "API is up"
              curl -fsS http://localhost:8787/ | grep -q '<!doctype html>' && echo "Web app served"
              docker rm -f kl; exit 0
            fi
            sleep 2
          done
          echo "API did not boot"; docker logs kl; docker rm -f kl; exit 1
